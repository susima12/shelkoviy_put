# Render Blueprint — фронтенд + SSR + API + SQLite
services:
  - type: web
    name: shelk-put
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_PATH
        value: ./data/festival.db
